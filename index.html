<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>⚽ Football Explorer</h1>

    <div class="search-box">
      <input type="text" id="teamInput" placeholder="Search team...">
      <button id="searchBtn">Search</button>
    </div>

    <div id="teamCard"></div>
    <div class="player-box">
        <input type="text" id="playerInput" placeholder="Search player...">
        <button id="playerBtn">Search Player</button>
  </div>

  <div id="playerCard"></div>

  <script src="script.js"></script>
</body>
</html>
